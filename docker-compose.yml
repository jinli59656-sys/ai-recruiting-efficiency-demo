services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: hr-assistant-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - hr-infra

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: hr-assistant-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin123}; do
        sleep 2;
      done;
      mc mb --ignore-existing local/$${MINIO_BUCKET:-resume-files};
      mc anonymous set none local/$${MINIO_BUCKET:-resume-files};
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-resume-files}
    restart: "no"
    networks:
      - hr-infra

  milvus-etcd:
    container_name: hr-assistant-milvus-etcd
    image: quay.io/coreos/etcd:v3.5.25
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: 1000
      ETCD_QUOTA_BACKEND_BYTES: 4294967296
      ETCD_SNAPSHOT_COUNT: 50000
    command: etcd -advertise-client-urls=http://milvus-etcd:2379 -listen-client-urls=http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - milvus_etcd_data:/etcd
    restart: unless-stopped
    networks:
      - hr-infra

  milvus-minio:
    container_name: hr-assistant-milvus-minio
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - milvus_minio_data:/minio_data
    restart: unless-stopped
    networks:
      - hr-infra

  milvus-standalone:
    container_name: hr-assistant-milvus-standalone
    image: milvusdb/milvus:v2.6.15
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
      MINIO_REGION: us-east-1
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - milvus-etcd
      - milvus-minio
    restart: unless-stopped
    networks:
      - hr-infra

networks:
  hr-infra:
    name: hr-assistant-infra

volumes:
  minio_data:
    name: hr-assistant-minio-data
  milvus_etcd_data:
    name: hr-assistant-milvus-etcd-data
  milvus_minio_data:
    name: hr-assistant-milvus-minio-data
  milvus_data:
    name: hr-assistant-milvus-data
